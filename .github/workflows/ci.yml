name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Lints every workflow under .github/workflows/ (actionlint also runs the
      # preinstalled shellcheck over each run: block). The release asset is
      # pinned and checksum-verified before it runs.
      - name: Lint workflows (actionlint)
        run: |
          version=1.7.12
          asset="actionlint_${version}_linux_amd64.tar.gz"
          sha256=8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v${version}/${asset}" -o "$RUNNER_TEMP/$asset"
          echo "${sha256}  $RUNNER_TEMP/${asset}" | sha256sum -c -
          tar -C "$RUNNER_TEMP" -xzf "$RUNNER_TEMP/$asset" actionlint
          "$RUNNER_TEMP/actionlint" -color

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run verification
        run: python3 scripts/verify.py --mode ci
