name: Dependabot PR follow-up

# Thin caller: follows up on Dependabot update PRs by delegating to the shared
# reusable follow-up workflow. Failing PRs get a minimal Claude fix; green PRs
# get an `LGTM` comment. It never merges a PR.

on:
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

jobs:
  follow-up:
    uses: ./.github/workflows/_pr-followup.yml
    with:
      selector: dependabot
      pr_number: ${{ github.event.pull_request.number || '' }}
    secrets: inherit
