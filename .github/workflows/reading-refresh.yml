name: Reading list refresh & deploy

# Fetches the Instapaper reading list (unread + archive) hourly, commits the
# JSON snapshot when it changes, builds the site, and deploys to Cloudflare
# Pages via Direct Upload (wrangler). Everything runs in CI.
#
# Scheduled runs only build + deploy when the snapshot actually changed (the
# common case is no change, so most hourly runs end after the fetch). Manual
# (workflow_dispatch) and push runs always build + deploy so code changes ship.
#
# Required GitHub secrets:
#   INSTAPAPER_CONSUMER_KEY        - Instapaper Full API consumer key
#   INSTAPAPER_CONSUMER_SECRET     - Instapaper Full API consumer secret
#   INSTAPAPER_OAUTH_TOKEN         - Instapaper OAuth token
#   INSTAPAPER_OAUTH_TOKEN_SECRET  - Instapaper OAuth token secret
#   CLOUDFLARE_API_TOKEN           - Cloudflare API token (Account > Cloudflare Pages > Edit)
#   CLOUDFLARE_ACCOUNT_ID          - Cloudflare account id
# Required GitHub variable:
#   CLOUDFLARE_PAGES_PROJECT       - Cloudflare Pages project name
#
# CI reads the Instapaper credentials straight from GitHub secrets. Local
# development resolves the same values from 1Password instead:
#   npm run reading:fetch:op   (op run --env-file=.op.env -- ...)

on:
  schedule:
    - cron: "29 * * * *" # hourly at :29 UTC (staggered off :17 and :43)
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: reading-refresh
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify Instapaper secrets are present
        # Hard-fail on missing configuration so a misconfigured workflow cannot
        # pass silently: the fetch step below swallows errors on purpose, so a
        # missing secret would otherwise look like "no change" forever.
        env:
          INSTAPAPER_CONSUMER_KEY: ${{ secrets.INSTAPAPER_CONSUMER_KEY }}
          INSTAPAPER_CONSUMER_SECRET: ${{ secrets.INSTAPAPER_CONSUMER_SECRET }}
          INSTAPAPER_OAUTH_TOKEN: ${{ secrets.INSTAPAPER_OAUTH_TOKEN }}
          INSTAPAPER_OAUTH_TOKEN_SECRET: ${{ secrets.INSTAPAPER_OAUTH_TOKEN_SECRET }}
        run: |
          missing=0
          for var in INSTAPAPER_CONSUMER_KEY INSTAPAPER_CONSUMER_SECRET \
                     INSTAPAPER_OAUTH_TOKEN INSTAPAPER_OAUTH_TOKEN_SECRET; do
            if [ -z "${!var}" ]; then
              echo "::error::Required secret $var is not set"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ]

      - name: Fetch reading list from Instapaper
        # Resilient: if Instapaper is unavailable, keep the last committed
        # snapshot. A scheduled run then sees no change and skips redeploy; the
        # live site already serves that last snapshot. Missing credentials are
        # caught by the guard step above, so only transient failures land here.
        continue-on-error: true
        env:
          INSTAPAPER_CONSUMER_KEY: ${{ secrets.INSTAPAPER_CONSUMER_KEY }}
          INSTAPAPER_CONSUMER_SECRET: ${{ secrets.INSTAPAPER_CONSUMER_SECRET }}
          INSTAPAPER_OAUTH_TOKEN: ${{ secrets.INSTAPAPER_OAUTH_TOKEN }}
          INSTAPAPER_OAUTH_TOKEN_SECRET: ${{ secrets.INSTAPAPER_OAUTH_TOKEN_SECRET }}
        run: npm run reading:fetch

      - name: Commit snapshot if changed
        id: commit
        run: |
          if ! git diff --quiet -- src/reading.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/reading.json
            git commit -m "chore(reading): refresh Instapaper snapshot"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No changes to src/reading.json"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      # Build + deploy only when the snapshot changed on a scheduled run; always
      # for manual/push runs (so code changes ship even with no reading change).
      - name: Build
        if: steps.commit.outputs.changed == 'true' || github.event_name != 'schedule'
        run: npm run build

      - name: Deploy to Cloudflare Pages
        if: steps.commit.outputs.changed == 'true' || github.event_name != 'schedule'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
        run: |
          # Ensure the Direct Upload project exists (no-op if it already does).
          npx wrangler pages project create "$PROJECT" --production-branch=main 2>/dev/null || true
          npx wrangler pages deploy dist --project-name="$PROJECT" --branch=main --commit-dirty=true
