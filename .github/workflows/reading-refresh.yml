name: Reading list refresh & deploy

# Fetches the Instapaper reading list (unread + archive), commits the JSON
# snapshot when it changes, builds the site, and deploys to Cloudflare Pages
# via Direct Upload (wrangler). Everything runs in CI.
#
# Required GitHub secrets:
#   OP_SERVICE_ACCOUNT_TOKEN  - 1Password service account (reads Development vault)
#   CLOUDFLARE_API_TOKEN      - Cloudflare API token (Account > Cloudflare Pages > Edit)
#   CLOUDFLARE_ACCOUNT_ID     - Cloudflare account id
# Required GitHub variable:
#   CLOUDFLARE_PAGES_PROJECT  - Cloudflare Pages project name
#
# The op:// references live in .op.env (no secrets there).

on:
  schedule:
    - cron: "0 21 * * *" # daily at 06:00 JST (21:00 UTC prev day)
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: reading-refresh
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v1

      - name: Fetch reading list from Instapaper
        # Resilient: if Instapaper/op is unavailable, keep the last committed
        # snapshot and still build + deploy.
        continue-on-error: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: op run --env-file=.op.env -- npm run reading:fetch

      - name: Commit snapshot if changed
        run: |
          if ! git diff --quiet -- src/reading.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/reading.json
            git commit -m "chore(reading): refresh Instapaper snapshot"
            git push
          else
            echo "No changes to src/reading.json"
          fi

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
        run: |
          echo "== token verify =="
          curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            https://api.cloudflare.com/client/v4/user/tokens/verify \
            | jq '{success, status: .result.status, errors}'
          echo "== accounts accessible by this token =="
          ACC=$(curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            https://api.cloudflare.com/client/v4/accounts)
          echo "success: $(echo "$ACC" | jq -r '.success')"
          echo "num accounts: $(echo "$ACC" | jq -r '.result | length')"
          echo "account names: $(echo "$ACC" | jq -r '.result[].name')"
          echo "configured ACCOUNT_ID matches an accessible account: $(echo "$ACC" | jq --arg id "$CLOUDFLARE_ACCOUNT_ID" '[.result[].id] | index($id) != null')"
          echo "== pages projects under configured account (token+account check) =="
          curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects" \
            | jq '{success, errors, num: (.result | length?)}'
          echo "== ensure project & deploy =="
          npx wrangler pages project create "$PROJECT" --production-branch=main 2>/dev/null || true
          npx wrangler pages deploy dist --project-name="$PROJECT" --branch=main
