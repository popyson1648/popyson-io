name: Reading list refresh

# Refreshes the Instapaper reading list and redeploys the site with the fresh
# snapshot. Reading data is baked into the build (src/data.js imports
# src/reading.json), so refreshing it requires a rebuild + redeploy.
#
# This workflow owns ONLY the reading list. Blog/about/code changes ship through
# deploy.yml (on push to main); the two are intentionally decoupled so an
# Instapaper outage never blocks shipping other content.
#
# Behaviour:
#   - Fetch succeeds  -> build + deploy the fresh snapshot.
#   - Fetch fails     -> skip build + deploy. No redeploy happens, so the last
#                        successful deployment keeps serving its reading list.
#   - The committed src/reading.json is NOT updated here (no push to main). It is
#     only a static fallback/seed used by builds that do not fetch (deploy.yml's
#     best-effort path, CI verification, local dev).
#
# Required GitHub secrets:
#   INSTAPAPER_CONSUMER_KEY        - Instapaper Full API consumer key
#   INSTAPAPER_CONSUMER_SECRET     - Instapaper Full API consumer secret
#   INSTAPAPER_OAUTH_TOKEN         - Instapaper OAuth token
#   INSTAPAPER_OAUTH_TOKEN_SECRET  - Instapaper OAuth token secret
#   CLOUDFLARE_API_TOKEN           - Cloudflare API token (Account > Cloudflare Pages > Edit)
#   CLOUDFLARE_ACCOUNT_ID          - Cloudflare account id
# Required GitHub variable:
#   CLOUDFLARE_PAGES_PROJECT       - Cloudflare Pages project name
#
# CI reads the Instapaper credentials straight from GitHub secrets. Local
# development populates the same INSTAPAPER_* variables on its own; see
# .project/build.md (Reading list).

on:
  schedule:
    - cron: "29 * * * *" # hourly at :29 UTC (staggered off :17 and :43)
  workflow_dispatch:

concurrency:
  # Shared with deploy.yml so reading refreshes and site deploys never race to
  # upload to Cloudflare Pages at the same time.
  group: cloudflare-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify Instapaper secrets are present
        # Hard-fail on missing configuration so a misconfigured workflow cannot
        # pass silently: the fetch step below swallows errors on purpose, so a
        # missing secret would otherwise look like a transient outage forever.
        env:
          INSTAPAPER_CONSUMER_KEY: ${{ secrets.INSTAPAPER_CONSUMER_KEY }}
          INSTAPAPER_CONSUMER_SECRET: ${{ secrets.INSTAPAPER_CONSUMER_SECRET }}
          INSTAPAPER_OAUTH_TOKEN: ${{ secrets.INSTAPAPER_OAUTH_TOKEN }}
          INSTAPAPER_OAUTH_TOKEN_SECRET: ${{ secrets.INSTAPAPER_OAUTH_TOKEN_SECRET }}
        run: |
          missing=0
          for var in INSTAPAPER_CONSUMER_KEY INSTAPAPER_CONSUMER_SECRET \
                     INSTAPAPER_OAUTH_TOKEN INSTAPAPER_OAUTH_TOKEN_SECRET; do
            if [ -z "${!var}" ]; then
              echo "::error::Required secret $var is not set"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ]

      - name: Fetch reading list from Instapaper
        id: fetch
        # Soft-fail on a transient Instapaper outage: the build + deploy steps
        # below are gated on this step succeeding, so a failure simply skips the
        # redeploy and the last successful deployment keeps serving.
        continue-on-error: true
        env:
          INSTAPAPER_CONSUMER_KEY: ${{ secrets.INSTAPAPER_CONSUMER_KEY }}
          INSTAPAPER_CONSUMER_SECRET: ${{ secrets.INSTAPAPER_CONSUMER_SECRET }}
          INSTAPAPER_OAUTH_TOKEN: ${{ secrets.INSTAPAPER_OAUTH_TOKEN }}
          INSTAPAPER_OAUTH_TOKEN_SECRET: ${{ secrets.INSTAPAPER_OAUTH_TOKEN_SECRET }}
        run: npm run reading:fetch

      - name: Build
        if: steps.fetch.outcome == 'success'
        run: npm run build

      - name: Deploy to Cloudflare Pages
        if: steps.fetch.outcome == 'success'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
        run: |
          # Ensure the Direct Upload project exists (no-op if it already does).
          npx wrangler pages project create "$PROJECT" --production-branch=main 2>/dev/null || true
          npx wrangler pages deploy dist --project-name="$PROJECT" --branch=main --commit-dirty=true
