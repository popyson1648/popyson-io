repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint

  - repo: local
    hooks:
      - id: verify-pre-commit
        name: verify-pre-commit
        entry: python3 scripts/verify.py --mode standard
        language: system
        pass_filenames: false
