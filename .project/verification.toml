version = 1

[phases.format]
enabled = false
command = ""
reason = "No formatter is configured yet."

[phases.lint]
enabled = true
command = "npm run lint"
run_pre_commit = true
run_in_ci = true

[phases.actionlint]
enabled = true
command = "actionlint"
run_on_edit = false
run_pre_commit = false
run_pre_push = true
# CI runs actionlint through a dedicated ci.yml step, so the other workflows
# that call `verify.py --mode ci` do not need the actionlint binary installed.
run_in_ci = false

[phases.frontmatter]
enabled = false
command = ""
reason = "Now a Vitest spec (tests/check_frontmatter.test.mjs) run by the test_unit phase."

[phases.metadata_generate_check]
enabled = true
command = "node scripts/generate_metadata.mjs --check"
run_pre_commit = true
run_in_ci = true

[phases.metadata_quality]
enabled = false
command = ""
reason = "Now a Vitest spec (tests/check_metadata_quality.test.mjs) run by the test_unit phase."

[phases.typecheck]
enabled = true
command = "npm run typecheck"
run_pre_commit = true
run_in_ci = true

[phases.build]
enabled = true
command = "npm run build"
run_pre_push = true
run_in_ci = true

[phases.test_unit]
enabled = true
command = "npx vitest run --project unit"
run_pre_commit = true
run_in_ci = true

[phases.test_integration]
enabled = true
command = "npx vitest run --project integration"
# Asserts against the built dist/, so the build phase must run first; build is
# ordered before this in DEFAULT_ORDER and runs in the same modes. Skipped on
# per-edit runs to keep the inner loop fast.
run_on_edit = false
run_pre_commit = true
run_pre_push = true
run_in_ci = true

[phases.test_e2e]
enabled = false
command = ""

[phases.test_component]
enabled = true
command = "npx vitest run --project component"
run_pre_commit = true
run_in_ci = true

[phases.test_contract]
enabled = false
command = ""

[phases.accessibility]
enabled = true
command = "python3 tests/check_accessibility_static.py"
run_on_edit = true
run_pre_commit = true
run_in_ci = true

[phases.performance]
enabled = true
command = "npm run build && npm run lighthouse"
run_on_edit = false
run_pre_commit = false
run_pre_push = true
run_in_ci = true

[phases.bundle_size]
enabled = false
command = ""
