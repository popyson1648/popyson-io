version = 1

[phases.format]
enabled = false
command = ""
reason = "No formatter is configured yet."

[phases.lint]
enabled = true
command = "npm run lint"
run_pre_commit = true
run_in_ci = true

[phases.typecheck]
enabled = false
command = ""
reason = "No TypeScript typecheck is configured for this JavaScript project."

[phases.build]
enabled = true
command = "npm run build"
run_pre_push = true
run_in_ci = true

[phases.test_unit]
enabled = true
command = "npm run build && node scripts/check_markdown_rendering.mjs && node scripts/check_content_loader.mjs && node scripts/check_pagefind_search.mjs && node scripts/check_prerendered_routes.mjs"
run_pre_commit = true
run_in_ci = true

[phases.test_integration]
enabled = false
command = ""

[phases.test_e2e]
enabled = false
command = ""

[phases.test_component]
enabled = false
command = ""

[phases.test_contract]
enabled = false
command = ""

[phases.accessibility]
enabled = true
command = "python3 scripts/check_accessibility_static.py"
run_on_edit = true
run_pre_commit = true
run_in_ci = true

[phases.performance]
enabled = true
command = "npm run build && npm run lighthouse"
run_on_edit = false
run_pre_commit = false
run_pre_push = true
run_in_ci = true

[phases.bundle_size]
enabled = false
command = ""
