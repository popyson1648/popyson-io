# ============================================================
# About page content — bilingual (ja / en).
#
# Imported as a plain object by src/data.js (the `.toml` import is
# transformed to JS at build time by the tomlContent() Vite plugin)
# and exposed as window.BlogData.PERSON. Keep the shape stable:
# src/pages.jsx (AboutPage) reads name/role/initials/location/
# tagline/bio[lang]/career[]/activities[]/links[].
# ============================================================

[person]
